name: build-ipk

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release:
          - name: 23.05.5
            sdk_url: https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - name: 22.03.7
            sdk_url: https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SDK
        run: |
          set -eux
          curl -L "${{ matrix.release.sdk_url }}" -o sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Build package
        run: |
          set -eux
          mkdir -p sdk/package/luci-app-drcom-auth
          git -C "$GITHUB_WORKSPACE" archive --format=tar HEAD | tar -xf - -C "sdk/package/luci-app-drcom-auth"
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-compat
          make defconfig
          make package/luci-app-drcom-auth/compile V=s

      - name: Collect artifacts
        run: |
          set -eux
          mkdir -p out
          find sdk/bin/packages -name "luci-app-drcom-auth*.ipk" -exec cp {} out/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-drcom-auth-${{ matrix.release.name }}
          path: out/*.ipk

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -eux
          mkdir -p release-assets
          cp out/*.ipk "release-assets/luci-app-drcom-auth_${{ matrix.release.name }}.ipk"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.release.name }}
          path: release-assets/*.ipk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.ipk
          generate_release_notes: true
